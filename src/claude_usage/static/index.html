<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Claude Code Usage</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        html, body {
            overscroll-behavior: none;
            height: 100%;
            width: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="source-selector" id="sourceSelector">
            <button class="source-btn active" data-source="all">All</button>
            <button class="source-btn" data-source="claude">Claude Code</button>
            <button class="source-btn" data-source="codex">Codex</button>
        </div>
        <div class="source-indicator" id="sourceIndicator">
            Showing: <strong id="source-indicator-label">All sessions</strong>
        </div>
        <div class="card main-card">
            <!-- Tabs and Time Range -->
            <div class="controls">
                <div class="tabs">
                    <button class="tab active" data-tab="overview">Overview</button>
                    <button class="tab" data-tab="models">Models</button>
                    <button class="tab" data-tab="code">Code</button>
                    <button class="tab" data-tab="realtime">Real-time</button>
                </div>
                <div class="time-range" id="timeRangeGroup">
                    <button class="range-btn" data-range="all">All</button>
                    <button class="range-btn" data-range="30d">30d</button>
                    <button class="range-btn active" data-range="7d">7d</button>
                </div>
            </div>

            <!-- Overview Tab -->
            <div class="tab-content active" id="tab-overview">
                <div id="no-data-msg" class="no-data-msg" style="display:none"></div>
                <div class="overview-layout">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">Sessions</div>
                            <div class="stat-value" id="stat-sessions">-</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">&#28040;&#24687;&#25968;</div>
                            <div class="stat-value" id="stat-messages">-</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Total tokens</div>
                            <div class="stat-value" id="stat-tokens">-</div>
                            <div class="stat-sub" id="stat-tokens-detail"></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">&#27963;&#36827;&#22825;&#25968;</div>
                            <div class="stat-value" id="stat-active-days">-</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">&#24403;&#21069;&#36830;&#32493;</div>
                            <div class="stat-value" id="stat-current-streak">-</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">&#26368;&#38271;&#36830;&#32493;</div>
                            <div class="stat-value" id="stat-longest-streak">-</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">&#39640;&#23792;&#26102;&#27573;</div>
                            <div class="stat-value" id="stat-peak-hour">-</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">&#24120;&#29992;&#27169;&#22411;</div>
                            <div class="stat-value small" id="stat-favorite-model">-</div>
                        </div>
                    </div>
                    <div class="plan-usage-card">
                        <div class="plan-usage-header">
                            <span>Plan usage</span>
                            <select id="plan-select" class="plan-select">
                                <option value="pro">Pro (44k)</option>
                                <option value="max5">Max 5x (88k)</option>
                                <option value="max20">Max 20x (220k)</option>
                            </select>
                        </div>
                        <div class="plan-row">
                            <div class="plan-row-label">5-hour limit</div>
                            <div class="plan-row-bar-wrap"><div class="plan-row-bar" id="plan-5h-bar"></div></div>
                            <div class="plan-row-info" id="plan-5h-info">-</div>
                        </div>
                        <div class="plan-row">
                            <div class="plan-row-label">Weekly &middot; all models</div>
                            <div class="plan-row-bar-wrap"><div class="plan-row-bar" id="plan-week-bar"></div></div>
                            <div class="plan-row-info" id="plan-week-info">-</div>
                        </div>
                        <div class="plan-tokens-summary">
                            <span>5h: <strong id="plan-5h-tokens">-</strong></span>
                            <span>Week: <strong id="plan-week-tokens">-</strong></span>
                        </div>
                    </div>
                </div>

                <div class="heatmap-section">
                    <div class="heatmap-container" id="heatmap"></div>
                    <div class="heatmap-legend">
                        <span class="legend-text">&#23569;</span>
                        <span class="heatmap-cell legend" style="background-color: #ebedf0;"></span>
                        <span class="heatmap-cell legend" style="background-color: #9be9a8;"></span>
                        <span class="heatmap-cell legend" style="background-color: #40c463;"></span>
                        <span class="heatmap-cell legend" style="background-color: #30a14e;"></span>
                        <span class="heatmap-cell legend" style="background-color: #216e39;"></span>
                        <span class="legend-text">&#22810;</span>
                    </div>
                </div>

                <div class="fun-fact" id="fun-fact"></div>
            </div>

            <!-- Models Tab -->
            <div class="tab-content" id="tab-models">
                <div class="chart-container">
                    <canvas id="dailyChart"></canvas>
                </div>
                <div class="models-list" id="models-list"></div>
            </div>

            <!-- Code Tab -->
            <div class="tab-content" id="tab-code">
                <div class="stats-grid" style="margin-bottom:16px">
                    <div class="stat-card">
                        <div class="stat-label">&#24635;&#20195;&#30721;&#34892;&#25968;</div>
                        <div class="stat-value" id="code-total">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">&#35821;&#35328;&#25968;</div>
                        <div class="stat-value" id="code-langs">-</div>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="codeChart"></canvas>
                </div>
                <div class="models-list" id="code-legend"></div>
            </div>

            <!-- Real-time Tab -->
            <div class="tab-content" id="tab-realtime">
                <div id="realtime-content">
                    <div class="loading">&#21152;&#36733;&#20013;...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Session Detail Overlay -->
    <div id="session-detail" class="session-detail-overlay">
        <div class="detail-header">
            <button class="detail-back-btn" id="detail-back-btn">&#8592; &#36820;&#22238;</button>
            <div class="detail-header-info">
                <div class="detail-cwd" id="detail-cwd"></div>
                <div class="detail-header-badges">
                    <span class="detail-model-badge" id="detail-model-badge"></span>
                    <span class="detail-live-badge" id="detail-live-badge">
                        <span class="detail-live-dot"></span>&#23454;&#26102;
                    </span>
                </div>
            </div>
        </div>
        <div class="detail-messages" id="detail-messages"></div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
