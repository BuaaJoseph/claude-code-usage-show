<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Usage</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="dashboard">
        <header class="header">
            <h1>Claude Code Usage</h1>
        </header>

        <div class="card main-card">
            <!-- Tabs and Time Range -->
            <div class="controls">
                <div class="tabs">
                    <button class="tab active" data-tab="overview">Overview</button>
                    <button class="tab" data-tab="models">Models</button>
                    <button class="tab" data-tab="realtime">Real-time</button>
                </div>
                <div class="time-range" id="timeRangeGroup">
                    <button class="range-btn" data-range="all">All</button>
                    <button class="range-btn" data-range="30d">30d</button>
                    <button class="range-btn active" data-range="7d">7d</button>
                </div>
            </div>

            <!-- Overview Tab -->
            <div class="tab-content active" id="tab-overview">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Sessions</div>
                        <div class="stat-value" id="stat-sessions">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">消息数</div>
                        <div class="stat-value" id="stat-messages">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total tokens</div>
                        <div class="stat-value" id="stat-tokens">-</div>
                        <div class="stat-sub" id="stat-tokens-detail"></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">活跃天数</div>
                        <div class="stat-value" id="stat-active-days">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">当前连续</div>
                        <div class="stat-value" id="stat-current-streak">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">最长连续</div>
                        <div class="stat-value" id="stat-longest-streak">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">高峰时段</div>
                        <div class="stat-value" id="stat-peak-hour">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">常用模型</div>
                        <div class="stat-value small" id="stat-favorite-model">-</div>
                    </div>
                </div>

                <div class="heatmap-section">
                    <div class="heatmap-container" id="heatmap"></div>
                    <div class="heatmap-legend">
                        <span class="legend-text">少</span>
                        <span class="heatmap-cell legend" style="background-color: #ebedf0;"></span>
                        <span class="heatmap-cell legend" style="background-color: #9be9a8;"></span>
                        <span class="heatmap-cell legend" style="background-color: #40c463;"></span>
                        <span class="heatmap-cell legend" style="background-color: #30a14e;"></span>
                        <span class="heatmap-cell legend" style="background-color: #216e39;"></span>
                        <span class="legend-text">多</span>
                    </div>
                </div>

                <div class="fun-fact" id="fun-fact"></div>
            </div>

            <!-- Models Tab -->
            <div class="tab-content" id="tab-models">
                <div class="chart-container">
                    <canvas id="dailyChart"></canvas>
                </div>
                <div class="models-list" id="models-list"></div>
            </div>

            <!-- Real-time Tab -->
            <div class="tab-content" id="tab-realtime">
                <div id="realtime-content">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
